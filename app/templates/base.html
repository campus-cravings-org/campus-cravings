<!doctype html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='img/favicon.ico')}}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,100,1,200"
        rel="stylesheet" />
    <link href="{{ url_for('static', path='css/app.css')}}" rel="stylesheet">
    <style>
        .hamburger-button {
            border-radius: 14px;
            min-width: 48px;
            min-height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.35);
        }
        .hamburger-button:hover {
            background: rgba(255, 255, 255, 0.18);
        }
        .hamburger-dropdown {
            position: absolute;
            top: 66px;
            right: 16px;
            min-width: 200px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 26px 60px rgba(15, 23, 42, 0.16);
            display: none;
            z-index: 1050;
            overflow: hidden;
        }
        .hamburger-dropdown.show {
            display: block;
        }
        .hamburger-dropdown .dropdown-item {
            display: block;
            padding: 14px 18px;
            color: #1e2a5d;
            text-decoration: none;
            font-weight: 700;
            transition: background 0.2s ease;
        }
        .hamburger-dropdown .dropdown-item:hover {
            background: #f4f7ff;
        }
        .hamburger-dropdown .text-danger {
            color: #bf1f2d !important;
        }
        .navbar .container-fluid {
            position: relative;
        }
    </style>

    {% block external_css %}{% endblock %}
    {% block internal_css %}{% endblock %}
</head>

<body>
    {% include "navbar.html" %}
    {% block content %}{% endblock %}

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="appToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="2000">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastContent">
            </div>
        </div>
    </div>

    <script>
        var isLoggedIn = {{ user is not none | tojson }};
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var toggle = document.getElementById('hamburgerToggle');
            var menu = document.getElementById('hamburgerMenu');
            if (toggle && menu) {
                toggle.addEventListener('click', function (event) {
                    event.stopPropagation();
                    menu.classList.toggle('show');
                });
                document.addEventListener('click', function () {
                    menu.classList.remove('show');
                });
                menu.addEventListener('click', function (event) {
                    event.stopPropagation();
                });
            }

            var categoryToggle = document.getElementById('categoryDropdownButton');
            var categoryMenu = document.getElementById('categoryDropdownMenu');
            if (categoryToggle && categoryMenu) {
                categoryToggle.addEventListener('click', function (event) {
                    event.stopPropagation();
                    categoryMenu.classList.toggle('show');
                });
                document.addEventListener('click', function () {
                    categoryMenu.classList.remove('show');
                });
                categoryMenu.addEventListener('click', function (event) {
                    event.stopPropagation();
                    categoryMenu.classList.remove('show');
                });
            }

            var ratingToggle = document.getElementById('ratingDropdownButton');
            var ratingMenu = document.getElementById('ratingDropdownMenu');
            if (ratingToggle && ratingMenu) {
                ratingToggle.addEventListener('click', function (event) {
                    event.stopPropagation();
                    ratingMenu.classList.toggle('show');
                });
                document.addEventListener('click', function () {
                    ratingMenu.classList.remove('show');
                });
                ratingMenu.addEventListener('click', function (event) {
                    event.stopPropagation();
                    ratingMenu.classList.remove('show');
                });
            }

            document.querySelectorAll('.filter-item-all').forEach(function (button) {
                button.addEventListener('click', function (event) {
                    event.stopPropagation();
                });
            });
        });
    </script>
    {% block external_js %}{% endblock %}
</body>

</html>
