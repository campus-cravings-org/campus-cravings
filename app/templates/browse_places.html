{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Campus Cravings</h2>

    <!-- Search Bar -->
    <form method="get" action="/places" class="mb-4">
        <div class="input-group">
            <input type="text" name="search" class="form-control" placeholder="Search places..." value="{{ search or '' }}">
            <button type="submit" class="btn btn-primary">Search</button>
        </div>
    </form>

    <!-- Places Cards -->
    <div class="row">
        {% for place in places %}
        <div class="col-md-4 mb-4">
            <div class="card h-300">
                <img src="{{ place.image_url if place.image_url else 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT27gTKHqKhHk3i-EiarE5Q9IND_awvKaKjxw&s' }}" class="card-img-top" style="height: 200px; object-fit: cover;">
                <div class="card-body">
                    <h5 class="card-title">{{ place.name }}</h5>
                    <p class="card-text text-muted">{{ place.category }}</p>
                    <p class="card-text">{{ place.description }}</p>
                    <a href="/places/{{ place.id }}" class="btn btn-primary">View Menu</a>
                </div>
            </div>
        </div>
        {% endfor %}

        {% if not places %}
        <div class="col-12">
            <p class="text-muted">No places found.</p>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
