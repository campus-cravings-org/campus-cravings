{% extends "base.html" %}
{% block title %}Welcome - Campus Cravings{% endblock %}

{% block internal_css %}
<style>
    body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('/static/img/welcome.jpg');
        background-size: cover;
        background-position: center;
    }

    .phone-card {
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
        border-radius: 40px;
        max-width: 380px;
        width: 100%;
        padding: 3rem 2rem 2.5rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.15);
        text-align: center;
    }

    .logo-circle {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        margin: 0 auto 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .logo-circle img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .phone-card h2 {
        color: #FFFFFF;
        font-weight: 700;
        font-size: 1.6rem;
        margin-bottom: 0.25rem;
    }

    .phone-card h5 {
        color: #C4622D;
        font-weight: 600;
        margin-bottom: 0.5rem;
    }

    .tagline {
        color: #9CA3AF;
        font-size: 0.875rem;
        margin-bottom: 2rem;
    }

    .btn-log-in {
    background-color: #C4622D;
    color: #FFFFFF;
    border: 2px solid #FFFFFF;
    border-radius: 25px;
    padding: 0.7rem 1.5rem;
    flex: 1;
    font-weight: 600;
    font-size: 0.95rem;
    text-decoration: none;
    display: inline-block;
    text-align: center;
    transition: all 0.2s;
    }

    .btn-log-in:hover {
    background-color: #FFFFFF;
    color: #C4622D;
    border-color: #FFFFFF;
    }

    .btn-join-now {
        background-color: #0F2D1A;
        color: #FFFFFF;
        border: 2px solid #FFFFFF;
        border-radius: 25px;
        padding: 0.7rem 1.5rem;
        flex: 1;
        font-weight: 600;
        font-size: 0.95rem;
        text-decoration: none;
        display: inline-block;
        text-align: center;
        transition: all 0.2s;
    }

    .btn-join-now:hover {
        background-color: #FFFFFF;
        color: #0F2D1A;
    }

    .guest-link {
        color: #9CA3AF;
        text-decoration: none;
        font-size: 0.875rem;
        display: block;
        margin-top: 1rem;
    }

    .guest-link:hover {
        color: #FFFFFF;
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 100vh; padding-top: 130px; padding-bottom: 30px;">
    <div class="phone-card">

        <div class="logo-circle">
            <img src="/static/img/logo.png" alt="Campus Cravings Logo">
        </div>

        <h2>Welcome to Campus Cravings</h2>
        <h5>Let's get started!</h5>
        <p class="tagline">Discover food spots on campus</p>

        <div class="d-flex gap-3 mb-3">
            <a href="{{ url_for('login_view') }}" class="btn-log-in">Log in</a>
            <a href="{{ url_for('register_view') }}" class="btn-join-now">Join now</a>
        </div>

        <a href="{{ url_for('browse_places_view') }}" class="guest-link">Continue as a guest →</a>
    </div>
</div>
{% endblock %}
